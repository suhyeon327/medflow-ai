spring:
  datasource:
    url: jdbc:mysql://localhost:3306/medflow
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  profiles:
    active: dev

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    org.hibernate.SQL: debug